{% extends "base.html" %}
{% block content %}

<div class="form-card card">

    <div class="card-header">
        <div>
            <div class="card-title">Nouvelle Dépense</div>
            <div class="card-subtitle">Saisissez les informations et joignez la facture justificative</div>
        </div>
    </div>

<form action="/depenses/create" method="post" enctype="multipart/form-data">

    <div>
        <label>Description</label>
        <input type="text" name="description" required>
    </div>

    <div>
        <label>Montant</label>
        <input type="number" step="0.01" name="montant" required>
    </div>

    <div>
        <label>ID du Budget</label>
        <input type="number" name="budget_id" required>
    </div>

    <div>
        <label>Facture (PDF ou image)</label>
        <input type="file" name="facture" accept=".pdf,.jpg,.jpeg,.png" required>
    </div>

    <button type="submit">Enregistrer la dépense</button>
</form>


</div>

{% endblock %}
